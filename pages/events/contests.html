<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERU FIT LAB 出場大会情報</title>
  <style>
    h1 {
      width: 75%;
      margin: 20px auto;
      text-align: center;
      font-size: 2.2rem;
      white-space: nowrap; /* ← 改行禁止 */
    }
    
    /* 画面が狭いときは自動で縮む */
    @media (max-width: 500px) {
      h1 { font-size: 1.6rem; }
    }
    
    @media (max-width: 360px) {
      h1 { font-size: 1.3rem; }
    }
    
  .event {
    width: 85%;
    margin: 20px auto;
    padding: 20px;
    background: #fff;
    border-radius: 10px;
    text-align: left;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  
  /* event 内の文字 */
  .event-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
  }
  
  .event-detail {
    font-size: 15px;
    margin-left: 10px;
    color: #555;
  }
  
  /* 戻るリンク */
  .back-link {
    text-align: center;
    margin-top: 30px;
  }

  .back-link a {
    color: #333;
    text-decoration: none;
    font-weight: bold;
  }
</style>
</head>
<body>
  <h1>出場大会情報</h1>

  <div class="event">
    <div class="event-title">2026年7月26日：Muscle & Beauty Fitness Games in Himeji 2026</div>
    <div class="event-detail">主催：<a href="https://hbbf.main.jp/">HBBF</a></div>
    <div class="event-detail">種目：メンズフィジーク 176㎝以下級</div>
  </div>
    
  <div class="back-link">
    <a href="https://terufitlab.github.io/TeruFitLab/">← メインページ</a>
  </div>

</body>
</html>
